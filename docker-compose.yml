services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-research_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-research_app}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata17:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Uncomment only if you need to connect to PostgreSQL from the host.
    # ports:
    #   - "${POSTGRES_HOST_PORT:-5432}:5432"
    restart: unless-stopped

  app:
    image: ${KRIS_IMAGE:-exde1968/kardashev-research-intelligence-system:0.1.0}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_HOST_BIND:-0.0.0.0}:${APP_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      PYTHONUNBUFFERED: "1"
      PYTHONUTF8: "1"
      PYTHON_BIN: /opt/venv/bin/python
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-research_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-research_app}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PANEL_PASSWORD_FILE: /run/secrets/panel_password
      PANEL_SESSION_TTL_SECONDS: ${PANEL_SESSION_TTL_SECONDS:-604800}
      PANEL_SESSION_SECRET_FILE: /run/secrets/panel_session_secret
      PANEL_COOKIE_SECURE: ${PANEL_COOKIE_SECURE:-}
      KRIS_AGENT_TOKEN_FILE: /run/secrets/kris_agent_token
      ARXIV_PDF_DIR: /data/arxiv_pdfs
      ARXIV_TEXT_DIR: /data/arxiv_text
      # Set OBSIDIAN_VAULT_PATH to /vault if you mount a vault below.
      # OBSIDIAN_VAULT_PATH: /vault
    secrets:
      - postgres_password
      - panel_password
      - panel_session_secret
      - kris_agent_token
    volumes:
      - ./data:/data
      # Mount your Obsidian vault when needed, then set OBSIDIAN_VAULT_PATH=/vault.
      # - D:/path/to/YourVault:/vault
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles:
      - nginx
    depends_on:
      app:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
      NGINX_CERTIFICATE: ${NGINX_CERTIFICATE:-/etc/nginx/certs/fullchain.pem}
      NGINX_CERTIFICATE_KEY: ${NGINX_CERTIFICATE_KEY:-/etc/nginx/certs/privkey.pem}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-64m}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ${NGINX_CERT_DIR:-./deploy/nginx/certs}:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  pgdata17:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password.txt}
  panel_password:
    file: ${PANEL_PASSWORD_FILE:-./secrets/panel_password.txt}
  panel_session_secret:
    file: ${PANEL_SESSION_SECRET_FILE:-./secrets/panel_session_secret.txt}
  kris_agent_token:
    file: ${KRIS_AGENT_TOKEN_FILE:-./secrets/kris_agent_token.txt}
